name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: validate OpenClaw package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate OpenClaw manifest and skill metadata
        run: npm run validate

      - name: Check package contents
        run: npm run pack:dry-run
